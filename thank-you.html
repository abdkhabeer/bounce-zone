<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bounce Zone – Request Sent!</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Nunito', sans-serif; background: #FFFDF5; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 24px; }
    .box { max-width: 480px; }
    .icon { font-size: 5rem; display: block; margin-bottom: 24px; }
    h1 { font-family: 'Fredoka One', cursive; font-size: 2.8rem; color: #1A1A2E; margin-bottom: 12px; }
    p { font-size: 1.1rem; color: #666; font-weight: 600; line-height: 1.7; margin-bottom: 32px; }
    a { background: #FF6B35; color: #fff; font-weight: 800; font-size: 1rem; padding: 14px 36px; border-radius: 50px; text-decoration: none; }
    a:hover { background: #1A1A2E; }
  </style>
</head>
<body>
  <div class="box">
    <span class="icon">🎊</span>
    <h1>Request Sent!</h1>
    <p>JazakAllah khair! We've received your booking request and will be in touch within 24 hours to confirm your event.</p>
    <a href="/">Back to Home</a>
  </div>

</html>
